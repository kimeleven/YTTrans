<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YTTrans — YouTube 설명 번역기</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header>
    <div class="header-inner">
      <span class="logo">▶ YTTrans</span>
      <p class="subtitle">YouTube 영상 제목·설명을 40개 언어로 번역합니다</p>
    </div>
  </header>

  <main>
    <!-- URL 입력 -->
    <section class="input-section">
      <div class="input-row">
        <input
          id="url-input"
          type="text"
          placeholder="YouTube URL을 붙여넣으세요 (watch?v=, youtu.be/, shorts/ 지원)"
          autocomplete="off"
          spellcheck="false"
        />
        <button id="fetch-btn" class="btn btn-primary">
          <span class="btn-text">가져오기</span>
          <span class="spinner hidden"></span>
        </button>
      </div>
    </section>

    <!-- 에러 배너 -->
    <div id="error-banner" class="error-banner hidden">
      <span id="error-text"></span>
    </div>

    <!-- 영상 카드 -->
    <article id="video-card" class="video-card hidden">
      <img id="video-thumb" src="" alt="썸네일" class="thumb" />
      <div class="video-meta">
        <h2 id="video-title"></h2>
        <div class="original-label">원문 설명</div>
        <pre id="video-desc" class="desc-text"></pre>
      </div>
    </article>

    <!-- 번역 결과 -->
    <section id="translations" class="translations hidden">
      <div class="trans-layout">

        <!-- 왼쪽: 언어 사이드바 -->
        <nav id="lang-nav" class="lang-nav">
          <!-- JS로 생성 -->
        </nav>

        <!-- 오른쪽: 번역 결과 -->
        <div class="trans-result">
          <div id="trans-progress" class="trans-progress hidden">
            <span class="spinner-sm"></span>
            <span id="progress-text">번역 중...</span>
          </div>
          <div class="result-toolbar">
            <span id="active-lang-label" class="active-lang-label"></span>
            <button id="copy-btn" class="copy-btn">복사</button>
          </div>
          <h3 id="result-title" class="result-title"></h3>
          <pre id="result-desc" class="result-text"></pre>
        </div>

      </div>
    </section>
  </main>

  <script src="/app.js" defer></script>
</body>
</html>
