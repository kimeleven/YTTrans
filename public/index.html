<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YTTrans — YouTube 설명 번역기</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header>
    <div class="header-inner">
      <span class="logo">▶ YTTrans</span>
      <p class="subtitle">YouTube 영상 설명을 한국어 · 영어 · 일본어로 번역합니다</p>
    </div>
  </header>

  <main>
    <!-- URL 입력 -->
    <section class="input-section">
      <div class="input-row">
        <input
          id="url-input"
          type="text"
          placeholder="YouTube URL을 붙여넣으세요 (watch?v=, youtu.be/, shorts/ 지원)"
          autocomplete="off"
          spellcheck="false"
        />
        <button id="fetch-btn" class="btn btn-primary">
          <span class="btn-text">가져오기</span>
          <span class="spinner hidden"></span>
        </button>
      </div>
    </section>

    <!-- 에러 배너 -->
    <div id="error-banner" class="error-banner hidden">
      <span id="error-text"></span>
    </div>

    <!-- 영상 카드 -->
    <article id="video-card" class="video-card hidden">
      <img id="video-thumb" src="" alt="썸네일" class="thumb" />
      <div class="video-meta">
        <h2 id="video-title"></h2>
        <div class="original-label">원문 설명</div>
        <pre id="video-desc" class="desc-text"></pre>
      </div>
    </article>

    <!-- 번역 결과 -->
    <section id="translations" class="translations hidden">
      <div class="translate-header">
        <span class="translate-title">번역 결과</span>
        <span id="translate-loading" class="translate-loading hidden">
          <span class="spinner-sm"></span> 번역 중...
        </span>
      </div>

      <nav class="tab-nav">
        <button class="tab-btn active" data-lang="ko">한국어</button>
        <button class="tab-btn" data-lang="en">English</button>
        <button class="tab-btn" data-lang="ja">日本語</button>
      </nav>

      <div class="tab-panels">
        <div class="tab-panel active" data-lang="ko">
          <div class="panel-toolbar">
            <button class="copy-btn" data-copy="ko">복사</button>
          </div>
          <h3 id="title-ko" class="result-title"></h3>
          <pre id="text-ko" class="result-text"></pre>
        </div>
        <div class="tab-panel" data-lang="en">
          <div class="panel-toolbar">
            <button class="copy-btn" data-copy="en">Copy</button>
          </div>
          <h3 id="title-en" class="result-title"></h3>
          <pre id="text-en" class="result-text"></pre>
        </div>
        <div class="tab-panel" data-lang="ja">
          <div class="panel-toolbar">
            <button class="copy-btn" data-copy="ja">コピー</button>
          </div>
          <h3 id="title-ja" class="result-title"></h3>
          <pre id="text-ja" class="result-text"></pre>
        </div>
      </div>
    </section>
  </main>

  <script src="/app.js" defer></script>
</body>
</html>
